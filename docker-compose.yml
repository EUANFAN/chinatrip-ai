services:
  postgres:
    image: postgres:16
    container_name: chinatrip-ai-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: chinatrip
      POSTGRES_PASSWORD: chinatrip
      POSTGRES_DB: chinatrip_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chinatrip -d chinatrip_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
